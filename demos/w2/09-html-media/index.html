<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Media elements</h1>
    <h2>Images</h2>
    <img
      src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      alt="orange cat"
    />
    <figcaption>
      Photo by
      <a
        href="https://unsplash.com/@michaelsum1228?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
        >Michael Sum</a
      >
      on
      <a
        href="https://unsplash.com/photos/orange-tabby-cat-on-brown-parquet-floor-LEpfefQf4rU?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
        >Unsplash</a
      >
    </figcaption>
    <!-- not all images need alt text -->
    <!-- if the image is decorative, it does not need it -->
    <img src="./media/images/orange-cat.jpg" alt="orange cat" />

    <h2>Audio</h2>
    <audio src="./media/audio/whoosh.mp3" controls loop autoplay muted>
      Whoosh sound
    </audio>
    <figcaption>
      Sound Effect by
      <a
        href="https://pixabay.com/users/viralaudio-44793737/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=405921"
        >Viral Audio</a
      >
      from
      <a
        href="https://pixabay.com/sound-effects//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=405921"
        >Pixabay</a
      >
    </figcaption>
    <h2>Video</h2>
    <video
      src="./media/video/bees.mp4"
      controls
      loop
      muted
      poster="./media/images/orange-cat.jpg"
    >
      Bees
    </video>
    <figcaption>
      Video by
      <a
        href="https://pixabay.com/users/adege-4994132/?utm_source=link-attribution&utm_medium=referral&utm_campaign=video&utm_content=224959"
        >Andreas</a
      >
      from
      <a
        href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=video&utm_content=224959"
        >Pixabay</a
      >
    </figcaption>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube-nocookie.com/embed/I6lANHo2WPY?si=NlysXUJpe5M5llRr&amp;start=20"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
